name: 📚 Cập nhật dữ liệu văn bản pháp luật

on:
  schedule:
    # Chạy mỗi 6 giờ: 0h, 6h, 12h, 18h UTC (7h, 13h, 19h, 1h VN)
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Cho phép chạy thủ công từ GitHub Actions tab

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: 🌐 Run data fetch script
        run: python scripts/fetch_data.py
        env:
          PYTHONUNBUFFERED: 1

      - name: 📊 Check for changes
        id: check_changes
        run: |
          git diff --quiet data/documents.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: 💾 Commit and push changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          git add data/documents.json
          
          # Get stats for commit message
          TOTAL=$(python -c "import json; d=json.load(open('data/documents.json')); print(d.get('total_documents', 0))")
          
          git commit -m "📚 Auto-update: ${TOTAL} văn bản | $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: ✅ Summary
        run: |
          echo "## 📊 Kết quả cập nhật" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.check_changes.outputs.changed }}" == "true" ]; then
            TOTAL=$(python -c "import json; d=json.load(open('data/documents.json')); print(d.get('total_documents', 0))")
            SOURCES=$(python -c "import json; d=json.load(open('data/documents.json')); print(', '.join(d.get('sources', [])))")
            echo "- ✅ **Trạng thái:** Cập nhật thành công" >> $GITHUB_STEP_SUMMARY
            echo "- 📚 **Tổng văn bản:** ${TOTAL}" >> $GITHUB_STEP_SUMMARY
            echo "- 🌐 **Nguồn:** ${SOURCES}" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ℹ️ **Trạng thái:** Không có thay đổi mới" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "- 🕐 **Thời gian:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY

  # Keep Streamlit app alive (prevent hibernation)
  keep-alive:
    runs-on: ubuntu-latest
    needs: update-data
    steps:
      - name: 🏓 Ping Streamlit app
        run: |
          curl -s -o /dev/null -w "%{http_code}" https://tinnam888888-haiquan.streamlit.app/ || true
          echo "Pinged Streamlit app to prevent hibernation"
